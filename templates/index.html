<!DOCTYPE html>
<html lang="gl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vixilancia - Gravacións</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0f1115;
            --bg-secondary: #1a1d23;
            --bg-hover: #252830;
            --text-primary: #e4e6eb;
            --text-secondary: #8a8d93;
            --accent: #3b82f6;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #2d3039;
            --success: #22c55e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }

        .header {
            grid-column: 1 / -1;
            padding: 14px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .day-list {
            list-style: none;
        }

        .day-item {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }

        .day-item:hover { background: var(--bg-hover); }

        .day-item.active { background: var(--accent); }
        .day-item.active .meta { color: rgba(255,255,255,0.75); }

        .day-item .date {
            font-weight: 500;
            font-size: 14px;
        }

        .day-item .meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        .content {
            padding: 24px;
            overflow-y: auto;
        }

        .player-wrapper {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        video {
            width: 100%;
            max-height: 72vh;
            display: block;
        }

        .info {
            margin-top: 14px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            gap: 24px;
            font-size: 14px;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .info .label {
            color: var(--text-primary);
            font-weight: 500;
            margin-right: 6px;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
            color: var(--text-secondary);
            font-size: 16px;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 15px;
            z-index: 10;
            border-radius: 8px;
            gap: 12px;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.8s linear infinite;
        }

        .loading-detail {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .sections {
            margin-top: 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .section {
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .section h3 {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .section-list {
            max-height: 260px;
            overflow-y: auto;
        }

        .segment-item {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .segment-item:last-child { border-bottom: none; }

        .segment-item.excluded {
            opacity: 0.5;
        }

        .segment-item .reason {
            font-size: 11px;
            color: var(--danger);
            margin-left: 8px;
        }

        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 14px;
            color: var(--danger);
            font-size: 14px;
        }

        .btn-regen {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
        }

        .btn-regen:hover { opacity: 0.85; }

        .btn-regen:disabled { opacity: 0.5; cursor: not-allowed; }

        .empty-list {
            padding: 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 180px 1fr;
            }
            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .day-list {
                display: flex;
                overflow-x: auto;
            }
            .day-item {
                white-space: nowrap;
                border-bottom: none;
                border-right: 1px solid var(--border);
                min-width: 140px;
            }
            .sections {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <header class="header">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            <h1>Vixilancia</h1>
        </header>
        <aside class="sidebar">
            <ul class="day-list" id="dayList"></ul>
        </aside>
        <main class="content">
            <div id="emptyState" class="empty-state">Selecciona un día para ver as gravacións</div>
            <div id="playerSection" style="display:none">
                <div class="player-wrapper">
                    <div id="loadingOverlay" class="loading-overlay" style="display:none">
                        <div class="spinner"></div>
                        <span id="loadingText">Xerando vídeo do día...</span>
                        <span id="loadingDetail" class="loading-detail"></span>
                    </div>
                    <video id="player" controls preload="metadata"></video>
                </div>
                <div class="info">
                    <span><span class="label">Data:</span><span id="infoDate"></span></span>
                    <span><span class="label">Fragmentos:</span><span id="infoSegments"></span></span>
                    <span><span class="label">Tamaño:</span><span id="infoSize"></span></span>
                    <button class="btn-regen" id="btnRegen" onclick="regenerateCache()">Rexenerar vídeo</button>
                </div>
                <div class="sections">
                    <div class="section">
                        <h3>Fragmentos incluídos</h3>
                        <div class="section-list" id="includedList"></div>
                    </div>
                    <div class="section">
                        <h3>Fragmentos descartados</h3>
                        <div class="section-list" id="excludedList"></div>
                    </div>
                </div>
                <div id="errorBanner" class="error-banner" style="display:none"></div>
            </div>
        </main>
    </div>

    <script>
        let currentDay = null;
        let segmentData = {included: [], excluded: []};

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
            return (bytes / 1073741824).toFixed(2) + ' GB';
        }

        function loadDays() {
            fetch('/api/days')
                .then(r => r.json())
                .then(days => {
                    const list = document.getElementById('dayList');
                    list.innerHTML = '';

                    if (!days.length) {
                        list.innerHTML = '<li class="empty-list">Sen gravacións</li>';
                        return;
                    }

                    days.forEach(day => {
                        const li = document.createElement('li');
                        li.className = 'day-item' + (day.date === currentDay ? ' active' : '');
                        li.innerHTML =
                            '<div class="date">' + day.date + '</div>' +
                            '<div class="meta">' + day.segments + ' fragmentos · ' + day.total_size_human + '</div>';
                        li.onclick = () => selectDay(day.date);
                        list.appendChild(li);
                    });

                    if (!currentDay) selectDay(days[0].date);
                })
                .catch(err => {
                    console.error('Error cargando días:', err);
                    document.getElementById('dayList').innerHTML =
                        '<li class="empty-list">Erro ao cargar os datos</li>';
                });
        }

        function selectDay(date) {
            currentDay = date;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('playerSection').style.display = '';
            document.getElementById('errorBanner').style.display = 'none';

            document.querySelectorAll('.day-item').forEach(el => {
                el.classList.toggle('active', el.querySelector('.date').textContent === date);
            });

            document.getElementById('infoDate').textContent = date;

            const loading = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const loadingDetail = document.getElementById('loadingDetail');
            loading.style.display = 'flex';
            loadingText.textContent = 'Xerando vídeo do día...';
            loadingDetail.textContent = '';

            const player = document.getElementById('player');
            const timestamp = Date.now();
            player.src = '/video/' + date + '?t=' + timestamp;

            player.oncanplay = () => {
                loading.style.display = 'none';
            };
            player.onerror = () => {
                loading.style.display = 'none';
                document.getElementById('errorBanner').style.display = '';
                document.getElementById('errorBanner').textContent =
                    'Erro ao reproducir o vídeo. Podes intentar rexenerar o vídeo co botón de abaixo.';
            };

            loadSegments(date);
        }

        function loadSegments(date) {
            fetch('/api/segments/' + date)
                .then(r => r.json())
                .then(data => {
                    if (data.included) {
                        segmentData = data;
                    } else {
                        segmentData = {included: data, excluded: []};
                    }

                    const included = segmentData.included || [];
                    const excluded = segmentData.excluded || [];

                    document.getElementById('infoSegments').textContent = included.length;
                    let total = 0;
                    included.forEach(s => total += s.size);
                    document.getElementById('infoSize').textContent = formatSize(total);

                    const incList = document.getElementById('includedList');
                    incList.innerHTML = '';
                    if (included.length === 0) {
                        incList.innerHTML = '<div class="empty-list">Sen fragmentos</div>';
                    }
                    included.forEach(seg => {
                        const div = document.createElement('div');
                        div.className = 'segment-item';
                        div.innerHTML = '<span>' + seg.name + '</span><span>' + seg.size_human + '</span>';
                        incList.appendChild(div);
                    });

                    const excList = document.getElementById('excludedList');
                    excList.innerHTML = '';
                    if (excluded.length === 0) {
                        excList.innerHTML = '<div class="empty-list">Ningún descartado</div>';
                    }
                    excluded.forEach(seg => {
                        const div = document.createElement('div');
                        div.className = 'segment-item excluded';
                        div.innerHTML = '<span>' + seg.name + (seg.reason ? '<span class="reason">(' + seg.reason + ')</span>' : '') + '</span><span>' + seg.size_human + '</span>';
                        excList.appendChild(div);
                    });
                })
                .catch(err => {
                    console.error('Error cargando segmentos:', err);
                });
        }

        function regenerateCache() {
            if (!currentDay) return;
            const btn = document.getElementById('btnRegen');
            btn.disabled = true;
            btn.textContent = 'Rexenerando...';

            const loading = document.getElementById('loadingOverlay');
            loading.style.display = 'flex';
            document.getElementById('loadingText').textContent = 'Rexenerando vídeo...';
            document.getElementById('loadingDetail').textContent = '';

            const player = document.getElementById('player');
            player.pause();

            fetch('/video/' + currentDay + '?force=1', {method: 'HEAD'})
                .then(() => {
                    const timestamp = Date.now();
                    player.src = '/video/' + currentDay + '?t=' + timestamp;
                    player.oncanplay = () => {
                        loading.style.display = 'none';
                        btn.disabled = false;
                        btn.textContent = 'Rexenerar vídeo';
                    };
                    player.onerror = () => {
                        loading.style.display = 'none';
                        btn.disabled = false;
                        btn.textContent = 'Rexenerar vídeo';
                        document.getElementById('errorBanner').style.display = '';
                        document.getElementById('errorBanner').textContent = 'Erro ao rexenerar o vídeo.';
                    };
                    player.load();
                })
                .catch(() => {
                    loading.style.display = 'none';
                    btn.disabled = false;
                    btn.textContent = 'Rexenerar vídeo';
                });

            loadSegments(currentDay);
        }

        loadDays();
    </script>
</body>
</html>
